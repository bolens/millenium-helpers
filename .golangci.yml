version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1005"
        - "-QF1003"
  exclusions:
    rules:
      # Historical module path spelling (millenium ≠ millennium).
      - linters: [misspell]
        text: "millenium"

formatters:
  enable:
    - gofmt
    - goimports
