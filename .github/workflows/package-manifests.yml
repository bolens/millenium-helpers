name: "CI: Package Manifests Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packaging/scoop/**'
      - 'packaging/winget/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Scoop JSON
        run: |
          jq . packaging/scoop/millennium-helpers.json >/dev/null
          echo "Scoop JSON is valid!"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate Winget YAMLs
        run: |
          python3 -c "
          import yaml, glob
          for f in glob.glob('packaging/winget/*.yaml'):
              print(f'Checking {f}...')
              with open(f, 'r') as file:
                  yaml.safe_load(file)
          "
          echo "All Winget YAMLs are valid!"
