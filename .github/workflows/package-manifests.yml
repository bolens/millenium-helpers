name: "CI: Package Manifests Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
      - 'scripts/ci/check-winget-manifests.sh'
      - '.github/workflows/package-manifests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
      - 'scripts/ci/check-winget-manifests.sh'
      - '.github/workflows/package-manifests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed packaging paths
    runs-on: ubuntu-latest
    outputs:
      winget: ${{ steps.filter.outputs.winget }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            winget:
              - 'packaging/winget/**'
              - 'VERSION'
              - 'scripts/ci/check-winget-manifests.sh'
              - '.github/workflows/package-manifests.yml'

  validate:
    name: Validate Scoop / Winget manifests
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Scoop JSON
        run: |
          jq . packaging/scoop/millennium-helpers.json >/dev/null
          echo "Scoop JSON is valid!"

      - name: Set up Python
        if: needs.changes.outputs.winget == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: needs.changes.outputs.winget == 'true'
        run: pip install pyyaml

      - name: Validate Winget YAMLs (parse)
        if: needs.changes.outputs.winget == 'true'
        run: |
          python3 -c "
          import yaml, glob
          for f in glob.glob('packaging/winget/*.yaml'):
              print(f'Checking {f}...')
              with open(f, 'r', encoding='utf-8') as file:
                  yaml.safe_load(file)
          "
          echo "All Winget YAMLs are valid!"

      - name: Validate Winget manifests (structure)
        if: needs.changes.outputs.winget == 'true'
        run: bash scripts/ci/check-winget-manifests.sh

  validate-winget-windows:
    name: winget validate (Windows)
    needs: [changes]
    if: needs.changes.outputs.winget == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Skip winget validate (PowerShell package)
        shell: pwsh
        run: |
          Write-Host @"
          ::notice::Skipping ``winget validate``.
          WinGet portable NestedInstallerFiles only allow ``.exe`` files.
          This package is PowerShell-based; Scoop is the supported multi-command Windows install path.
          YAML structure is still checked on Ubuntu via check-winget-manifests.sh.
          "@
