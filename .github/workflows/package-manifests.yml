name: "CI: Package Manifests Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
      - 'scripts/ci/check-winget-manifests.sh'
      - '.github/workflows/package-manifests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
      - 'scripts/ci/check-winget-manifests.sh'
      - '.github/workflows/package-manifests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed packaging paths
    runs-on: ubuntu-latest
    outputs:
      winget: ${{ steps.filter.outputs.winget }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            winget:
              - 'packaging/winget/**'
              - 'VERSION'
              - 'scripts/ci/check-winget-manifests.sh'
              - '.github/workflows/package-manifests.yml'

  validate:
    name: Validate Scoop / Winget manifests
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Scoop JSON
        run: |
          set -euo pipefail
          for f in packaging/scoop/*.json; do
            jq . "$f" >/dev/null
            echo "Scoop JSON OK: $f"
          done

      - name: Assert Scoop release package points at trimmed Windows release asset
        run: |
          set -euo pipefail
          url="$(jq -r .url packaging/scoop/millennium-helpers.json)"
          [[ "$url" == *"/releases/download/"*"/millennium-helpers-windows.zip" ]] || {
            echo "::error::Scoop url must be a trimmed Windows release asset, got: $url"
            exit 1
          }
          hash_url="$(jq -r '.autoupdate.hash.url // empty' packaging/scoop/millennium-helpers.json)"
          [[ "$hash_url" == *"/millennium-helpers-windows.zip.sha256" ]] || {
            echo "::error::Scoop autoupdate.hash.url must point at the .sha256 sidecar, got: $hash_url"
            exit 1
          }
          for bin in millennium millennium-mcp millennium-diag; do
            jq -e --arg b "$bin" '.bin | flatten | index($b)' packaging/scoop/millennium-helpers.json >/dev/null || {
              echo "::error::Scoop bin list missing '$bin'"
              exit 1
            }
          done
          echo "Scoop release-asset URL and bins look good."

      - name: Assert Scoop git package tracks main archive
        run: |
          set -euo pipefail
          manifest=packaging/scoop/millennium-helpers-git.json
          version="$(jq -r .version "$manifest")"
          [[ "$version" == "nightly" ]] || {
            echo "::error::Scoop git package version must be 'nightly', got: $version"
            exit 1
          }
          url="$(jq -r .url "$manifest")"
          [[ "$url" == *"archive/refs/heads/main.zip" ]] || {
            echo "::error::Scoop git url must be the main branch archive, got: $url"
            exit 1
          }
          extract_dir="$(jq -r .extract_dir "$manifest")"
          [[ "$extract_dir" == "millenium-helpers-main" ]] || {
            echo "::error::Scoop git extract_dir must be millenium-helpers-main, got: $extract_dir"
            exit 1
          }
          for bin in millennium millennium-mcp millennium-diag; do
            jq -e --arg b "$bin" '.bin | flatten | index($b)' "$manifest" >/dev/null || {
              echo "::error::Scoop git bin list missing '$bin'"
              exit 1
            }
          done
          echo "Scoop git/main archive manifest looks good."

      - name: Set up Python
        if: needs.changes.outputs.winget == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: needs.changes.outputs.winget == 'true'
        run: pip install pyyaml

      - name: Validate Winget YAMLs (parse)
        if: needs.changes.outputs.winget == 'true'
        run: |
          python3 -c "
          import yaml, glob
          for f in glob.glob('packaging/winget/*.yaml'):
              print(f'Checking {f}...')
              with open(f, 'r', encoding='utf-8') as file:
                  yaml.safe_load(file)
          "
          echo "All Winget YAMLs are valid!"

      - name: Validate Winget manifests (structure)
        if: needs.changes.outputs.winget == 'true'
        run: bash scripts/ci/check-winget-manifests.sh
