name: "CI: Package Manifests Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
      - 'scripts/windows/**'
      - 'scripts/ci/check-winget-manifests.sh'
      - '.github/workflows/package-manifests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'packaging/scoop/**'
      - 'packaging/winget/**'
      - 'scripts/windows/**'
      - 'scripts/ci/check-winget-manifests.sh'
      - '.github/workflows/package-manifests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Scoop JSON
        run: |
          jq . packaging/scoop/millennium-helpers.json >/dev/null
          echo "Scoop JSON is valid!"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate Winget YAMLs (parse)
        run: |
          python3 -c "
          import yaml, glob
          for f in glob.glob('packaging/winget/*.yaml'):
              print(f'Checking {f}...')
              with open(f, 'r', encoding='utf-8') as file:
                  yaml.safe_load(file)
          "
          echo "All Winget YAMLs are valid!"

      - name: Validate Winget manifests (structure)
        run: bash scripts/ci/check-winget-manifests.sh

  validate-winget-windows:
    name: winget validate (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check whether InstallerSha256 is a placeholder
        id: hash
        shell: pwsh
        run: |
          $yaml = Get-Content packaging/winget/bolens.millenniumhelpers.installer.yaml -Raw
          if ($yaml -match 'InstallerSha256:\s*([0-9a-fA-F]{64})') {
            $sha = $Matches[1]
            $isPlaceholder = ($sha -eq ('0' * 64))
            $placeholder = if ($isPlaceholder) { 'true' } else { 'false' }
            "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "placeholder=$placeholder" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "InstallerSha256=$sha placeholder=$placeholder"
          } else {
            throw "InstallerSha256 not found in installer manifest"
          }

      - name: Validate with winget
        if: steps.hash.outputs.placeholder != 'true'
        shell: pwsh
        run: winget validate --manifest packaging/winget

      - name: Skip winget validate (placeholder hash)
        if: steps.hash.outputs.placeholder == 'true'
        shell: pwsh
        run: |
          Write-Host "::notice::Skipping winget validate while InstallerSha256 is a placeholder (all zeros). It will run after a release packaging bump."
