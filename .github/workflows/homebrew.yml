name: "CI: Homebrew Formula Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'Formula/**'
      - '.github/workflows/homebrew.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Formula/**'
      - '.github/workflows/homebrew.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        formula:
          - millennium-helpers
          - millennium-helpers-bin
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit Formula
        run: |
          set -euo pipefail
          # Audit formula files in-tree so conflicts_with resolves without an
          # "untrusted" third-party tap (local/* is never a Homebrew org tap).
          brew audit --strict "Formula/${{ matrix.formula }}.rb"
