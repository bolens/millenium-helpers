name: "CI: Homebrew Formula Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'Formula/**'
      - '.github/workflows/homebrew.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Formula/**'
      - '.github/workflows/homebrew.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        formula:
          - millennium-helpers
          - millennium-helpers-bin
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit Formula
        env:
          # local/* is a CI-only tap; allow loading sibling formulas for conflicts_with.
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          set -euo pipefail
          TAP="$(brew --repository)/Library/Taps/local/homebrew-local"
          mkdir -p "$TAP/Formula"
          # Both formulas must be present so conflicts_with can resolve locally.
          cp Formula/*.rb "$TAP/Formula/"
          # Homebrew refuses to load sibling formulas from a non-git tap.
          git -C "$TAP" init
          git -C "$TAP" config user.email "ci@example.com"
          git -C "$TAP" config user.name "ci"
          git -C "$TAP" add Formula
          git -C "$TAP" commit -m "ci formulas"
          # Prefer explicit trust when Homebrew enforces tap trust (6.x+).
          brew trust --formula "local/local/millennium-helpers" || true
          brew trust --formula "local/local/millennium-helpers-bin" || true
          brew audit --formula "local/local/${{ matrix.formula }}"
