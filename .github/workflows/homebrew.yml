name: "CI: Homebrew Formula Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'Formula/**'
      - '.github/workflows/homebrew.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Formula/**'
      - '.github/workflows/homebrew.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        formula:
          - millennium-helpers
          - millennium-helpers-bin
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit Formula
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/local/homebrew-local/Formula"
          # Both formulas must be present so conflicts_with can resolve locally.
          cp Formula/*.rb "$(brew --repository)/Library/Taps/local/homebrew-local/Formula/"
          brew audit --formula "local/local/${{ matrix.formula }}"
