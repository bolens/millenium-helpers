name: "CI: Cross-Platform Test Suite"

on:
  push:
    branches: [ main ]
    # Tag pushes always run (GitHub skips path filters for tags), which the
    # release workflow gate depends on.
    tags: [ 'v*' ]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'completions/**'
      - 'man/**'
      - 'install.sh'
      - 'VERSION'
      - 'Formula/**'
      - 'packaging/**'
      - '.github/workflows/test-suite.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/package-install-windows.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'completions/**'
      - 'man/**'
      - 'install.sh'
      - 'VERSION'
      - 'Formula/**'
      - 'packaging/**'
      - '.github/workflows/test-suite.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/package-install-windows.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: read

jobs:
  # Fast fail-early check: verify every script parses cleanly on all
  # supported distros before spending time on the (much slower) behavioral
  # test matrix below.
  syntax-check:
    name: Linux (${{ matrix.distro }}) - Syntax Check
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:12
          - distro: ubuntu
            image: ubuntu:24.04
          - distro: fedora
            image: fedora:latest
          - distro: archlinux
            image: archlinux:latest
    steps:
      - name: Install git
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            case "${{ matrix.distro }}" in
              debian|ubuntu)
                if apt-get update -qq && apt-get install -y -qq git; then
                  exit 0
                fi
                ;;
              fedora)
                if dnf install -y -q git; then
                  exit 0
                fi
                ;;
              archlinux)
                if pacman -Sy --noconfirm --quiet git; then
                  exit 0
                fi
                ;;
            esac
            echo "git install attempt ${attempt} failed; retrying in $((attempt * 5))s..." >&2
            sleep $((attempt * 5))
          done
          echo "git install failed after retries" >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v7

      - name: bash -n all scripts
        run: |
          set -e
          for f in scripts/*.sh install.sh tests/run_tests.sh tests/lib/*.sh tests/unit/*.sh tests/behavioral/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

  # Each unit/behavioral test file gets its own job so failures/slow tests in
  # one script don't block or delay the others, and results come back as soon
  # as each individual suite finishes rather than after one long sequential
  # run.
  test:
    name: Linux (${{ matrix.distro }}) - ${{ matrix.suite }}
    needs: [syntax-check]
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        distro: [debian, ubuntu, fedora, archlinux]
        suite:
          - tests/unit/test_common.sh
          - tests/unit/test_mocks.sh
          - tests/unit/test_completions.sh
          - tests/unit/test_install_track.sh
          - tests/behavioral/test_install.sh
          - tests/behavioral/test_theme.sh
          - tests/behavioral/test_schedule.sh
          - tests/behavioral/test_purge.sh
          - tests/behavioral/test_repair.sh
          - tests/behavioral/test_upgrade.sh
          - tests/behavioral/test_diag.sh
          - tests/behavioral/test_mcp.sh
          - tests/behavioral/test_packaging_ci.sh
          - tests/behavioral/test_security.sh
        include:
          - distro: debian
            image: debian:12
          - distro: ubuntu
            image: ubuntu:24.04
          - distro: fedora
            image: fedora:latest
          - distro: archlinux
            image: archlinux:latest
    steps:
      - name: Install dependencies (Debian/Ubuntu)
        if: matrix.distro == 'debian' || matrix.distro == 'ubuntu'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if apt-get update -qq && apt-get install -y -qq \
              git jq python3 python3-yaml curl unzip tar coreutils procps util-linux \
              sudo bash cron >/dev/null; then
              exit 0
            fi
            echo "apt install attempt ${attempt} failed; retrying in $((attempt * 5))s..." >&2
            sleep $((attempt * 5))
          done
          echo "apt install failed after retries" >&2
          exit 1

      - name: Install dependencies (Fedora)
        if: matrix.distro == 'fedora'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if dnf install -y -q \
              git jq python3 python3-pyyaml curl unzip tar coreutils procps-ng util-linux \
              sudo bash cronie shadow-utils; then
              exit 0
            fi
            echo "dnf install attempt ${attempt} failed; retrying in $((attempt * 5))s..." >&2
            sleep $((attempt * 5))
          done
          echo "dnf install failed after retries" >&2
          exit 1

      - name: Install dependencies (Arch)
        if: matrix.distro == 'archlinux'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if pacman -Sy --noconfirm --quiet \
              git jq python python-yaml curl unzip tar coreutils procps-ng util-linux \
              sudo bash cronie shadow; then
              exit 0
            fi
            echo "pacman install attempt ${attempt} failed; retrying in $((attempt * 5))s..." >&2
            sleep $((attempt * 5))
          done
          echo "pacman install failed after retries" >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v7

      # Suites that build or invoke bin/millennium (Go 1.22+).
      - name: Set up Go
        if: >-
          matrix.suite == 'tests/behavioral/test_schedule.sh' ||
          matrix.suite == 'tests/behavioral/test_theme.sh' ||
          matrix.suite == 'tests/behavioral/test_purge.sh' ||
          matrix.suite == 'tests/behavioral/test_upgrade.sh' ||
          matrix.suite == 'tests/behavioral/test_diag.sh' ||
          matrix.suite == 'tests/behavioral/test_security.sh' ||
          matrix.suite == 'tests/behavioral/test_repair.sh' ||
          matrix.suite == 'tests/behavioral/test_mcp.sh' ||
          matrix.suite == 'tests/behavioral/test_install.sh'
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Create non-root test user
        run: |
          useradd -m testuser
          chown -R testuser:testuser "$GITHUB_WORKSPACE"

      # Build as root (setup-go cache paths) then hand the binary to testuser.
      - name: Build Go dispatcher
        if: >-
          matrix.suite == 'tests/behavioral/test_schedule.sh' ||
          matrix.suite == 'tests/behavioral/test_theme.sh' ||
          matrix.suite == 'tests/behavioral/test_purge.sh' ||
          matrix.suite == 'tests/behavioral/test_upgrade.sh' ||
          matrix.suite == 'tests/behavioral/test_diag.sh' ||
          matrix.suite == 'tests/behavioral/test_security.sh' ||
          matrix.suite == 'tests/behavioral/test_repair.sh' ||
          matrix.suite == 'tests/behavioral/test_mcp.sh' ||
          matrix.suite == 'tests/behavioral/test_install.sh'
        shell: bash
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < VERSION)"
          mkdir -p bin
          (cd go && CGO_ENABLED=0 go build \
            -ldflags "-X github.com/bolens/millenium-helpers/internal/version.Version=${ver}" \
            -o ../bin/millennium ./cmd/millennium)
          chown testuser:testuser bin/millennium

      # Scripts distinguish root vs non-root behavior (e.g. sudo hints,
      # passwordless-sudo setup being skipped). Running as a regular user
      # matches how these scripts are used in the real world and exercises
      # that logic, which running as root (the container default) would skip.
      - name: Run ${{ matrix.suite }}
        run: su testuser -c "PATH='$PATH' bash '${{ matrix.suite }}'"

  test-windows:
    name: Windows - ${{ matrix.suite }}
    needs: [syntax-check]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - tests/windows/common.Tests.ps1
          - tests/windows/Args.Tests.ps1
          - tests/windows/millennium-diag.Tests.ps1
          - tests/windows/millennium-upgrade.Tests.ps1
          - tests/windows/millennium-theme.Tests.ps1
          - tests/windows/millennium-schedule.Tests.ps1
          - tests/windows/install.Tests.ps1
          - tests/windows/InstallTrack.Tests.ps1
          - tests/windows/completions.Tests.ps1
          - tests/windows/millennium-mcp.Tests.ps1
          - tests/windows/millennium-repair.Tests.ps1
          - tests/windows/millennium-purge.Tests.ps1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Schedule config / theme list thin-wrap to Go; Pester builds bin/millennium.exe.
      - name: Set up Go
        if: >-
          matrix.suite == 'tests/windows/millennium-schedule.Tests.ps1' ||
          matrix.suite == 'tests/windows/millennium-theme.Tests.ps1' ||
          matrix.suite == 'tests/windows/millennium-purge.Tests.ps1' ||
          matrix.suite == 'tests/windows/millennium-upgrade.Tests.ps1' ||
          matrix.suite == 'tests/windows/millennium-diag.Tests.ps1' ||
          matrix.suite == 'tests/windows/millennium-repair.Tests.ps1'
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester -Path "${{ matrix.suite }}" -Output Detailed

  test-macos:
    name: macOS - ${{ matrix.suite }}
    needs: [syntax-check]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - tests/unit/test_common.sh
          - tests/unit/test_mocks.sh
          - tests/unit/test_completions.sh
          - tests/unit/test_install_track.sh
          - tests/behavioral/test_install.sh
          - tests/behavioral/test_theme.sh
          - tests/behavioral/test_schedule.sh
          - tests/behavioral/test_purge.sh
          - tests/behavioral/test_repair.sh
          - tests/behavioral/test_upgrade.sh
          - tests/behavioral/test_diag.sh
          - tests/behavioral/test_mcp.sh
          - tests/behavioral/test_packaging_ci.sh
          - tests/behavioral/test_security.sh
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install PyYAML for packaging suite
        if: matrix.suite == 'tests/behavioral/test_packaging_ci.sh'
        run: |
          # macOS runners ship Homebrew Python (PEP 668); use a throwaway venv.
          python3 -m venv "$RUNNER_TEMP/mh-pyyaml"
          "$RUNNER_TEMP/mh-pyyaml/bin/pip" install --quiet pyyaml
          echo "$RUNNER_TEMP/mh-pyyaml/bin" >> "$GITHUB_PATH"

      # Suites that build or invoke bin/millennium.
      - name: Set up Go
        if: >-
          matrix.suite == 'tests/behavioral/test_schedule.sh' ||
          matrix.suite == 'tests/behavioral/test_theme.sh' ||
          matrix.suite == 'tests/behavioral/test_purge.sh' ||
          matrix.suite == 'tests/behavioral/test_upgrade.sh' ||
          matrix.suite == 'tests/behavioral/test_diag.sh' ||
          matrix.suite == 'tests/behavioral/test_security.sh' ||
          matrix.suite == 'tests/behavioral/test_repair.sh' ||
          matrix.suite == 'tests/behavioral/test_mcp.sh' ||
          matrix.suite == 'tests/behavioral/test_install.sh'
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run ${{ matrix.suite }}
        run: |
          bash "${{ matrix.suite }}"
