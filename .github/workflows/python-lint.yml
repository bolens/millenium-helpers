name: "CI: Python Code Linting"

on:
  push:
    branches: [ main ]
    # Tag pushes always run (GitHub skips path filters for tags) so the
    # release workflow gate can wait on python-lint for the tag SHA.
    tags: [ 'v*' ]
    paths:
      - 'scripts/**/*.py'
      - 'scripts/ci/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**/*.py'
      - 'scripts/ci/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python-lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff lint (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Compile check
        run: python3 -m py_compile scripts/ci/check-cli-contract.py

      - name: Run ruff check
        uses: astral-sh/ruff-action@v4.1.0
        with:
          src: scripts/ci/check-cli-contract.py
