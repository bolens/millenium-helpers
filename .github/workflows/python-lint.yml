name: "CI: Python Code Linting"

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**/*.py'
      - 'scripts/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**/*.py'
      - 'scripts/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python-lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff lint (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Compile check
        run: |
          python3 -m py_compile scripts/millennium-mcp.py
          python3 -m py_compile scripts/ci/check-cli-contract.py

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          src: >-
            scripts/millennium-mcp.py
            scripts/ci/check-cli-contract.py
