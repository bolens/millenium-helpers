name: "CI: Python Code Linting"

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/*.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/*.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff lint (millennium-mcp.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install ruff
        run: pip install ruff

      - name: Compile check
        run: python -m py_compile scripts/millennium-mcp.py

      - name: Run ruff check
        run: ruff check scripts/*.py
