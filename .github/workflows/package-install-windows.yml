name: "CI: Windows Package Installation Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'packaging/scoop/**'
      - 'scripts/windows/**'
      - 'scripts/millennium-mcp.py'
      - 'completions/powershell/**'
      - 'VERSION'
      - '.github/workflows/package-install-windows.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packaging/scoop/**'
      - 'scripts/windows/**'
      - 'scripts/millennium-mcp.py'
      - 'completions/powershell/**'
      - 'VERSION'
      - '.github/workflows/package-install-windows.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-scoop:
    name: Test Scoop Package Install
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Scoop
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          Invoke-Expression (Invoke-WebRequest -UseBasicParsing https://get.scoop.sh)

      - name: Build trimmed Windows zip and install via Scoop
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $stage = Join-Path $env:TEMP "mh-scoop-stage"
          $zipPath = Join-Path $env:TEMP "millennium-helpers-windows.zip"
          Remove-Item -Recurse -Force $stage, $zipPath -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path (Join-Path $stage "scripts") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage "completions") | Out-Null

          # Match release.yml Windows payload layout (MCP + PowerShell completions).
          Copy-Item -Recurse scripts\windows (Join-Path $stage "scripts\windows")
          Copy-Item scripts\millennium-mcp.py (Join-Path $stage "scripts\millennium-mcp.py")
          Copy-Item -Recurse completions\powershell (Join-Path $stage "completions\powershell")
          Copy-Item VERSION, LICENSE, README.md $stage\
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "third_party") | Out-Null
          Copy-Item third_party\MILLENNIUM-LICENSE.md (Join-Path $stage "third_party\MILLENNIUM-LICENSE.md")

          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $zipPath -Force

          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
          $escapedZipPath = $zipPath.Replace('\', '\\')
          $manifest = Get-Content packaging/scoop/millennium-helpers.json -Raw
          $manifest = $manifest -replace '"url":\s*"[^"]+"', "`"url`": `"$escapedZipPath`""
          $manifest = $manifest -replace '"hash":\s*"[^"]+"', "`"hash`": `"$hash`""
          $manifestPath = Join-Path $env:TEMP "millennium-helpers.json"
          $manifest | Set-Content $manifestPath -Force

          # Manifest URL shape check (release asset naming), independent of local install URL.
          $declaredUrl = (Get-Content packaging/scoop/millennium-helpers.json -Raw | ConvertFrom-Json).url
          if ($declaredUrl -notmatch '/releases/download/v[^/]+/millennium-helpers-windows\.zip$') {
            throw "Scoop manifest url must be a trimmed Windows release asset, got: $declaredUrl"
          }

          $env:PATH += ";$HOME\scoop\shims"
          scoop install $manifestPath

      - name: Setup Mock Steam Environment
        shell: powershell
        run: |
          New-Item -Path "HKCU:\Software\Valve" -Force | Out-Null
          New-Item -Path "HKCU:\Software\Valve\Steam" -Force | Out-Null
          Set-ItemProperty -Path "HKCU:\Software\Valve\Steam" -Name "SteamPath" -Value "C:\MockSteam" -Force
          New-Item -ItemType Directory -Path "C:\MockSteam" -Force | Out-Null

      - name: Verify Scoop commands run
        shell: powershell -NoProfile -Command ". '{0}'"
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH += ";$HOME\scoop\shims"
          $prefix = scoop prefix millennium-helpers
          $diagLib = Join-Path $prefix "scripts\windows\lib\DiagReport.ps1"
          if (-not (Test-Path $diagLib)) {
            throw "Missing modular diag report library at $diagLib (scripts/windows/lib not packaged)"
          }
          Write-Host "Diag lib OK: $diagLib"
          # Parse-check diag modules under Windows PowerShell 5.1 (catches UTF-8/ANSI issues).
          Get-ChildItem (Join-Path $prefix "scripts\windows\lib\*.ps1") | ForEach-Object {
            $errs = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs)
            if ($errs -and $errs.Count -gt 0) {
              throw "Parse error in $($_.Name): $($errs[0])"
            }
          }
          Write-Host "Diag lib parse OK (Windows PowerShell)"
          millennium help
          millennium-mcp -Help
          millennium-diag -DryRun
          $json = millennium-diag -Json | ConvertFrom-Json
          foreach ($key in @('install_method', 'mixed_install_ok', 'scripts_up_to_date')) {
            if (-not ($json.PSObject.Properties.Name -contains $key)) {
              throw "millennium-diag -Json missing required field: $key"
            }
          }
          Write-Host "install_method=$($json.install_method) scripts_up_to_date=$($json.scripts_up_to_date)"
