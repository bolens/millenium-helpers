name: "CD: Deployment & Release Automation"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.2.3)'
        required: true
        default: 'v-draft'
      skip_ci_gate:
        description: 'Skip waiting for required CI (test-suite/shellcheck/completions). Only for v-draft / emergency dispatch — never for real releases.'
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  gate:
    name: Wait for required CI
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_ci_gate != true)
    steps:
      - name: Ensure required workflows passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          # These workflows declare tags: [v*] so tag pushes always schedule them.
          REQUIRED_WORKFLOWS=(
            test-suite.yml
            shellcheck.yml
            completions.yml
          )

          echo "Waiting for required CI on $SHA:"
          printf '  - %s\n' "${REQUIRED_WORKFLOWS[@]}"

          declare -A passed=()
          # Fail fast only when nothing is queued/running for any pending workflow.
          fail_fast_after=10

          for attempt in $(seq 1 60); do
            all_done=true
            any_activity=false
            missing=()

            for wf in "${REQUIRED_WORKFLOWS[@]}"; do
              [[ -n "${passed[$wf]:-}" ]] && continue
              all_done=false

              mapfile -t runs < <(
                gh run list \
                  --repo "${{ github.repository }}" \
                  --workflow "$wf" \
                  --commit "$SHA" \
                  --limit 5 \
                  --json databaseId,status,conclusion,event \
                  --jq '.[] | select(.status=="completed") | [.databaseId,.conclusion,.event] | @tsv'
              )

              if (( ${#runs[@]} > 0 )); then
                wf_ok=false
                for line in "${runs[@]}"; do
                  id="$(echo "$line" | cut -f1)"
                  conclusion="$(echo "$line" | cut -f2)"
                  event="$(echo "$line" | cut -f3)"
                  echo "[$wf] completed run $id (event=$event conclusion=$conclusion)"
                  if [[ "$conclusion" == "success" ]]; then
                    wf_ok=true
                  fi
                done
                if [[ "$wf_ok" == "true" ]]; then
                  echo "[$wf] passed."
                  passed[$wf]=1
                  continue
                fi
                echo "::error::$wf completed but did not succeed for $SHA"
                exit 1
              fi

              in_progress="$(
                gh run list \
                  --repo "${{ github.repository }}" \
                  --workflow "$wf" \
                  --commit "$SHA" \
                  --limit 5 \
                  --json status \
                  --jq '[.[] | select(.status=="in_progress" or .status=="queued" or .status=="pending" or .status=="waiting")] | length'
              )"
              if [[ "$in_progress" -gt 0 ]]; then
                any_activity=true
                echo "Attempt $attempt/60: $wf still running..."
              else
                missing+=("$wf")
                echo "Attempt $attempt/60: no $wf run found yet for $SHA..."
              fi
            done

            if [[ "$all_done" == "true" ]]; then
              echo "All required CI workflows passed."
              exit 0
            fi

            if (( attempt >= fail_fast_after )) && [[ "$any_activity" == "false" ]] && (( ${#missing[@]} > 0 )); then
              echo "::error::No runs scheduled for: ${missing[*]} (SHA $SHA) after ${fail_fast_after} polls."
              echo "Tag pushes must trigger these workflows (tags: [v*]). Check on.push.tags and path filters."
              exit 1
            fi

            sleep 30
          done

          echo "::error::Timed out waiting for required CI on $SHA"
          exit 1

  build-release:
    name: Build & Package Release Assets
    needs: [gate]
    # Run even when gate is skipped (workflow_dispatch + skip_ci_gate)
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      linux_sha: ${{ steps.checksums.outputs.linux_sha }}
      windows_sha: ${{ steps.checksums.outputs.windows_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ "$TAG" != v-draft && "$VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::Tag version '$VERSION' does not match VERSION file '$FILE_VERSION'"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Create Linux/macOS Release Tarball
        run: |
          set -euo pipefail
          # Explicit Unix payload only — no Windows scripts, CI, packaging, or Nix.
          tar -czf millennium-helpers-linux.tar.gz \
            install.sh \
            VERSION \
            LICENSE \
            README.md \
            third_party/MILLENNIUM-LICENSE.md \
            scripts/common.sh \
            scripts/millennium.sh \
            scripts/millennium-diag.sh \
            scripts/millennium-mcp.py \
            scripts/millennium-purge.sh \
            scripts/millennium-repair.sh \
            scripts/millennium-schedule.sh \
            scripts/millennium-theme.sh \
            scripts/millennium-upgrade.sh \
            scripts/lib \
            completions \
            man

      - name: Create Windows Release Zip
        run: |
          set -euo pipefail
          # Windows payload — PowerShell scripts plus the shared MCP Python server
          # (millennium-mcp.ps1 looks for ../millennium-mcp.py next to scripts/windows/).
          # install.ps1 resolves VERSION via ..\..\VERSION.
          zip -r millennium-helpers-windows.zip \
            scripts/windows/ \
            scripts/millennium-mcp.py \
            completions/powershell/ \
            VERSION \
            LICENSE \
            README.md \
            third_party/MILLENNIUM-LICENSE.md

      - name: Calculate Checksums
        id: checksums
        run: |
          set -euo pipefail

          [[ -s millennium-helpers-linux.tar.gz ]] || {
            echo "::error::Linux/macOS tarball is missing or empty"
            exit 1
          }
          [[ -s millennium-helpers-windows.zip ]] || {
            echo "::error::Windows zip is missing or empty"
            exit 1
          }

          LINUX_SHA=$(sha256sum millennium-helpers-linux.tar.gz | cut -d' ' -f1)
          WINDOWS_SHA=$(sha256sum millennium-helpers-windows.zip | cut -d' ' -f1)

          for label_sha in "linux:${LINUX_SHA}" "windows:${WINDOWS_SHA}"; do
            label="${label_sha%%:*}"
            sha="${label_sha#*:}"
            if [[ ! "$sha" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::Invalid ${label} SHA256 (expected 64 lowercase hex): ${sha}"
              exit 1
            fi
            if [[ "$sha" =~ ^0{64}$ ]]; then
              echo "::error::Refusing placeholder all-zero ${label} SHA256"
              exit 1
            fi
          done

          echo "LINUX_SHA=$LINUX_SHA" >> "$GITHUB_ENV"
          echo "WINDOWS_SHA=$WINDOWS_SHA" >> "$GITHUB_ENV"
          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"
          echo "windows_sha=$WINDOWS_SHA" >> "$GITHUB_OUTPUT"

          echo "$LINUX_SHA  millennium-helpers-linux.tar.gz" > millennium-helpers-linux.tar.gz.sha256
          echo "$WINDOWS_SHA  millennium-helpers-windows.zip" > millennium-helpers-windows.zip.sha256

          # Round-trip verify the sidecar checksum files match the archives.
          sha256sum -c millennium-helpers-linux.tar.gz.sha256
          sha256sum -c millennium-helpers-windows.zip.sha256

      - name: Create GitHub Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          generate_release_notes: true
          body: |
            ## Release Verification & Checksums

            Platform-trimmed archives — used by Homebrew, Scoop, Winget manifests, and the piped installers:

            | Asset | Platform | Contents | SHA256 |
            | :--- | :--- | :--- | :--- |
            | `millennium-helpers-linux.tar.gz` | Linux/macOS | scripts, completions, man pages | `${{ env.LINUX_SHA }}` |
            | `millennium-helpers-windows.zip` | Windows | PowerShell scripts | `${{ env.WINDOWS_SHA }}` |

            ### Package Verification
            To verify the integrity of the downloaded assets, run:
            ```bash
            # On Linux/macOS
            sha256sum -c millennium-helpers-linux.tar.gz.sha256

            # On Windows (PowerShell)
            $h = (Get-FileHash .\millennium-helpers-windows.zip -Algorithm SHA256).Hash.ToLower()
            Get-Content .\millennium-helpers-windows.zip.sha256
            # Compare $h to the hash in the sidecar file
            ```
          files: |
            millennium-helpers-linux.tar.gz
            millennium-helpers-windows.zip
            millennium-helpers-linux.tar.gz.sha256
            millennium-helpers-windows.zip.sha256

  update-packaging:
    name: Open packaging update PR
    needs: [build-release]
    if: needs.build-release.result == 'success' && needs.build-release.outputs.tag != 'v-draft'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.cpr.outputs.pull-request-number }}
      pr_url: ${{ steps.cpr.outputs.pull-request-url }}
      pr_operation: ${{ steps.cpr.outputs.pull-request-operation }}
    steps:
      - name: Require PACKAGING_PAT
        env:
          PACKAGING_PAT: ${{ secrets.PACKAGING_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGING_PAT}" ]]; then
            echo "::error::PACKAGING_PAT secret is required for automated release packaging."
            echo "Without it, the packaging PR cannot trigger CI (GITHUB_TOKEN PRs do not),"
            echo "so auto-merge and publish cannot run. Draft release assets were still created."
            echo "Add a classic PAT with contents + pull-requests (and merge rights on main),"
            echo "then re-run this workflow or finish packaging manually."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PACKAGING_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Verify draft release assets and reuse build hashes
        id: hashes
        env:
          GH_TOKEN: ${{ secrets.PACKAGING_PAT }}
          VERSION: ${{ needs.build-release.outputs.version }}
          TAG: ${{ needs.build-release.outputs.tag }}
          LINUX_SHA: ${{ needs.build-release.outputs.linux_sha }}
          WINDOWS_SHA: ${{ needs.build-release.outputs.windows_sha }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/release-assets
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --dir /tmp/release-assets \
            --pattern 'millennium-helpers-linux.tar.gz' \
            --pattern 'millennium-helpers-windows.zip'

          GOT_LINUX="$(sha256sum /tmp/release-assets/millennium-helpers-linux.tar.gz | cut -d' ' -f1)"
          GOT_WINDOWS="$(sha256sum /tmp/release-assets/millennium-helpers-windows.zip | cut -d' ' -f1)"

          if [[ "$GOT_LINUX" != "$LINUX_SHA" ]]; then
            echo "::error::Draft Linux asset SHA mismatch (build=$LINUX_SHA download=$GOT_LINUX)"
            exit 1
          fi
          if [[ "$GOT_WINDOWS" != "$WINDOWS_SHA" ]]; then
            echo "::error::Draft Windows asset SHA mismatch (build=$WINDOWS_SHA download=$GOT_WINDOWS)"
            exit 1
          fi

          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"
          echo "windows_sha=$WINDOWS_SHA" >> "$GITHUB_OUTPUT"
          echo "Verified trimmed release assets for ${TAG}"

      - name: Update packaging manifests
        run: |
          bash scripts/ci/update-packaging-versions.sh \
            "${{ needs.build-release.outputs.version }}" \
            "${{ steps.hashes.outputs.linux_sha }}" \
            "${{ steps.hashes.outputs.windows_sha }}" \
            "${{ github.repository }}"

      - name: Verify version sync
        run: |
          pip install pyyaml
          bash scripts/ci/check-version-sync.sh

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          # PACKAGING_PAT is required so the opened PR triggers CI.
          token: ${{ secrets.PACKAGING_PAT }}
          commit-message: "chore(packaging): bump to v${{ needs.build-release.outputs.version }}"
          branch: "chore/packaging-v${{ needs.build-release.outputs.version }}"
          delete-branch: true
          title: "chore(packaging): bump to v${{ needs.build-release.outputs.version }}"
          body: |
            ## Summary
            Automated packaging bump for release **v${{ needs.build-release.outputs.version }}**.

            - Updates `VERSION`, Homebrew Formula, Scoop, Winget, versioned Arch
              (`packaging/millennium-helpers`), and Nix `nix/release-info.nix` to the trimmed
              release assets (`millennium-helpers-linux.tar.gz` / `millennium-helpers-windows.zip`)
            - Hashes come from the draft release assets built by this workflow
            - Arch `-git`, Scoop `-git`, Winget `bolens.millenniumhelpers.git`, and Nix `#millennium-helpers-git` stay tip-of-main / flake source
              and are not bumped here

            ## Automation
            If packaging CI passes, the release workflow will squash-merge this PR and publish the draft GitHub release.
            If CI fails, this PR and the draft release are left for manual recovery.

            ## Test plan
            - [ ] Confirm version-sync CI passes
            - [ ] Confirm Homebrew audit / Scoop / Winget manifest jobs pass
            - [ ] Confirm Scoop install test passes (trimmed zip layout)
            - [ ] Confirm PKGBUILD CI passes for versioned + `-git` packages

  finalize:
    name: Merge packaging PR & publish release
    needs: [build-release, update-packaging]
    if: needs.update-packaging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Publish when packaging already current
        if: needs.update-packaging.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-release.outputs.tag }}
        run: |
          set -euo pipefail
          echo "No packaging PR was opened (manifests already match v${{ needs.build-release.outputs.version }})."
          echo "Publishing draft release ${TAG}..."
          gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
          echo "::notice::Published ${TAG} without a packaging PR."

      - name: Wait for packaging CI, merge, and publish
        if: needs.update-packaging.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.PACKAGING_PAT }}
          PR: ${{ needs.update-packaging.outputs.pr_number }}
          PR_URL: ${{ needs.update-packaging.outputs.pr_url }}
          TAG: ${{ needs.build-release.outputs.tag }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Only these jobs gate auto-merge. Ignore CodeQL Analyze / labeler / etc.
          REQUIRED_CHECKS=(
            "Detect changed packaging paths"
            "VERSION matches packaging manifests"
            "Validate Scoop / Winget manifests"
            "Test Scoop Package Install"
            "homebrew"
          )

          echo "Packaging PR #${PR}: ${PR_URL}"
          echo "Waiting for packaging CI checks: ${REQUIRED_CHECKS[*]}"

          deadline=$((SECONDS + 2400))
          while (( SECONDS < deadline )); do
            checks_json="$(
              gh pr checks "${PR}" --repo "${REPO}" --json name,state 2>/dev/null || echo '[]'
            )"

            pending=0
            failed=0
            missing=0
            status_lines=()

            for name in "${REQUIRED_CHECKS[@]}"; do
              state="$(
                printf '%s' "$checks_json" | jq -r --arg n "$name" \
                  '[.[] | select(.name == $n) | .state] | first // empty'
              )"
              if [[ -z "$state" ]]; then
                missing=1
                status_lines+=("MISSING  ${name}")
                continue
              fi
              status_lines+=("${state}  ${name}")
              case "$state" in
                SUCCESS|NEUTRAL|SKIPPED)
                  ;;
                FAILURE|CANCELLED|TIMED_OUT|ACTION_REQUIRED|STARTUP_FAILURE|STALE)
                  failed=1
                  ;;
                *)
                  # PENDING, QUEUED, IN_PROGRESS, EXPECTED, etc.
                  pending=1
                  ;;
              esac
            done

            if (( missing == 0 && pending == 0 )); then
              printf '%s\n' "${status_lines[@]}"
              if (( failed != 0 )); then
                {
                  echo "## Release finalize: packaging CI failed"
                  echo ""
                  echo "Automatic merge/publish was skipped. Packaging checks:"
                  echo ""
                  echo '```'
                  printf '%s\n' "${status_lines[@]}"
                  echo '```'
                  echo ""
                  echo "**Manual recovery**"
                  echo "1. Fix the failing checks on this PR"
                  echo "2. Squash-merge this PR into \`main\`"
                  echo "3. Publish the draft GitHub release: \`${TAG}\`"
                  echo ""
                  echo "Draft release assets remain available; this PR was left open."
                } > /tmp/pr-comment.md
                gh pr comment "${PR}" --repo "${REPO}" --body-file /tmp/pr-comment.md || true
                echo "::error::Packaging CI failed on PR #${PR}; left draft release ${TAG} for manual publish"
                exit 1
              fi
              break
            fi

            echo "Still waiting (missing=${missing} pending=${pending})..."
            printf '%s\n' "${status_lines[@]}" || true
            sleep 30
          done

          if (( SECONDS >= deadline )); then
            gh pr comment "${PR}" --repo "${REPO}" --body "$(cat <<EOF
          ## Release finalize: packaging CI timed out

          Timed out waiting for required packaging checks on this PR.

          **Manual recovery**
          1. Ensure packaging workflows finished
          2. Squash-merge this PR into \`main\`
          3. Publish the draft release: \`${TAG}\`

          Draft release and this PR were left untouched.
          EOF
          )" || true
            echo "::error::Timed out waiting for packaging CI on PR #${PR}"
            exit 1
          fi

          echo "All packaging checks passed. Squash-merging PR #${PR}..."
          gh pr merge "${PR}" --repo "${REPO}" --squash --delete-branch

          echo "Publishing draft release ${TAG}..."
          # Publishing uses GITHUB_TOKEN so the merge PAT is not required for releases.
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release edit "${TAG}" --repo "${REPO}" --draft=false

          gh pr comment "${PR}" --repo "${REPO}" --body "$(cat <<EOF
          ## Release finalize: automatic publish

          Packaging CI passed. This PR was squash-merged and draft release **${TAG}** was published.
          EOF
          )" || true

          echo "::notice::Merged packaging PR #${PR} and published ${TAG}."
