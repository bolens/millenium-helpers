name: "CI: Nix Flake Validation"

on:
  push:
    branches: [ main ]
    paths:
      - '**.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/millennium-mcp.py'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'completions/**'
      - 'man/**'
      - 'go/**'
      - 'Makefile'
      - '.github/workflows/nix.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/millennium-mcp.py'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'completions/**'
      - 'man/**'
      - 'go/**'
      - 'Makefile'
      - '.github/workflows/nix.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Nix Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Flake (from-source / bin / git)
        run: |
          set -euo pipefail
          nix build --experimental-features "nix-command flakes" --no-link .#millennium-helpers-git

          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_URL="https://github.com/bolens/millenium-helpers/releases/download/v${VERSION}/millennium-helpers-v${VERSION}-src.tar.gz"
          BIN_URL="https://github.com/bolens/millenium-helpers/releases/download/v${VERSION}/millennium-helpers-v${VERSION}-linux-amd64.tar.gz"

          if curl -fsI "$TAG_URL" >/dev/null 2>&1; then
            nix build --experimental-features "nix-command flakes" --no-link .#millennium-helpers
            nix build --experimental-features "nix-command flakes" --no-link
          else
            echo "::notice::Source release asset not published yet ($TAG_URL); skipping from-source / default build"
            echo "Evaluated from-source package version:"
            nix eval --experimental-features "nix-command flakes" .#millennium-helpers.version
          fi

          if curl -fsI "$BIN_URL" >/dev/null 2>&1; then
            nix build --experimental-features "nix-command flakes" --no-link .#millennium-helpers-bin
          else
            echo "::notice::Release asset not published yet ($BIN_URL); skipping -bin package"
            nix eval --experimental-features "nix-command flakes" .#millennium-helpers-bin.version
          fi
