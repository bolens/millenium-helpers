name: "CI: Nix Flake Validation"

on:
  push:
    branches: [ main ]
    paths:
      - '**.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/millennium-mcp.py'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'completions/**'
      - 'man/**'
      - '.github/workflows/nix.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/millennium-mcp.py'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'completions/**'
      - 'man/**'
      - '.github/workflows/nix.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Nix Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Flake (release + git packages)
        run: |
          set -euo pipefail
          nix build --experimental-features "nix-command flakes" --no-link .#millennium-helpers-git

          VERSION="$(tr -d '[:space:]' < VERSION)"
          URL="https://github.com/bolens/millenium-helpers/releases/download/v${VERSION}/millennium-helpers-linux.tar.gz"
          if curl -fsI "$URL" >/dev/null 2>&1; then
            nix build --experimental-features "nix-command flakes" --no-link .#millennium-helpers
            nix build --experimental-features "nix-command flakes" --no-link
          else
            echo "::notice::Release asset not published yet ($URL); skipping release package / default build"
            echo "Evaluated release package version:"
            nix eval --experimental-features "nix-command flakes" .#millennium-helpers.version
          fi
