name: "CI: Shell Completions Validation"

on:
  push:
    branches: [ main ]
    # Tag pushes always run (GitHub skips path filters for tags) so the
    # release workflow gate can wait on completions CI for the tag SHA.
    tags: [ 'v*' ]
    paths:
      - 'completions/**'
      - 'tests/unit/test_completions.sh'
      - 'tests/unit/zsh_completion_sim.zsh'
      - '.github/workflows/completions.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'completions/**'
      - 'tests/unit/test_completions.sh'
      - 'tests/unit/zsh_completion_sim.zsh'
      - '.github/workflows/completions.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  completions:
    name: Validate shell completions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install zsh and fish
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh fish

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          # 0.114+ supports `string | commandline complete` used by test_completions.sh
          version: '0.114.0'

      - name: Bash completion (syntax + source)
        run: |
          bash -n completions/bash/millennium-helpers
          bash -c "source completions/bash/millennium-helpers"

      - name: Zsh completion (syntax + source)
        run: |
          zsh -n completions/zsh/_millennium-helpers
          zsh -c "autoload -U compinit && compinit -u && source completions/zsh/_millennium-helpers"

      - name: Fish completions (syntax + source)
        run: |
          for f in completions/fish/*.fish; do
            echo "Checking $f"
            fish -n "$f"
            # Source to catch runtime errors fish -n misses (e.g. bare unknown commands)
            fish -c "source $(pwd)/$f"
          done

      - name: Nushell completion (source check)
        run: nu -c "source completions/nushell/millennium-helpers.nu"

      - name: Cross-shell parity + runtime smokes
        run: bash tests/unit/test_completions.sh
