name: "CI: Shell Script Linting"

on:
  push:
    branches: [ main ]
    # Tag pushes always run (GitHub skips path filters for tags) so the
    # release workflow gate can wait on ShellCheck for the tag SHA.
    tags: [ 'v*' ]
    paths:
      - '**.sh'
      - 'install.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.sh'
      - 'install.sh'
      - '.github/workflows/shellcheck.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run ShellCheck Lint
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          ignore_paths: completions/ packaging/
          # zsh_completion_sim.zsh is zsh-only; ShellCheck cannot lint it (SC1071).
          ignore_names: zsh_completion_sim.zsh
