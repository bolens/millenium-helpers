name: "CI: PKGBUILD Package Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'packaging/millennium-helpers/**'
      - 'packaging/millennium-helpers-bin/**'
      - 'packaging/millennium-helpers-git/**'
      - 'packaging/lib/**'
      - 'scripts/ci/sync-git-srcinfo.sh'
      - 'scripts/ci/sync-stable-srcinfo.sh'
      - 'scripts/ci/sync-bin-srcinfo.sh'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'go/**'
      - 'completions/**'
      - 'man/**'
      - '.github/workflows/pkgbuild.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packaging/millennium-helpers/**'
      - 'packaging/millennium-helpers-bin/**'
      - 'packaging/millennium-helpers-git/**'
      - 'packaging/lib/**'
      - 'scripts/ci/sync-git-srcinfo.sh'
      - 'scripts/ci/sync-stable-srcinfo.sh'
      - 'scripts/ci/sync-bin-srcinfo.sh'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'go/**'
      - 'completions/**'
      - 'man/**'
      - '.github/workflows/pkgbuild.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate AUR packaging (${{ matrix.package }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - millennium-helpers
          - millennium-helpers-bin
          - millennium-helpers-git
    steps:
      - name: Install build tooling
        run: |
          pacman -Syu --noconfirm --quiet base-devel git namcap sudo curl go

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint PKGBUILD with namcap
        run: |
          cd "packaging/${{ matrix.package }}"
          namcap PKGBUILD

      - name: Create build user
        run: |
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          cp -r "$GITHUB_WORKSPACE" /home/builduser/millenium-helpers
          chown -R builduser:builduser /home/builduser/millenium-helpers
          su builduser -c 'git config --global --add safe.directory /home/builduser/millenium-helpers'

      - name: Verify .SRCINFO is up to date with PKGBUILD
        run: |
          PKG_DIR="packaging/${{ matrix.package }}"
          su builduser -c "cd /home/builduser/millenium-helpers/${PKG_DIR} && makepkg --printsrcinfo" > /tmp/generated.SRCINFO
          if ! diff -u -I '^\s*pkgver =' "${PKG_DIR}/.SRCINFO" /tmp/generated.SRCINFO; then
            echo "::error::${PKG_DIR}/.SRCINFO is out of date. Run 'makepkg --printsrcinfo > .SRCINFO' in ${PKG_DIR} and commit the result."
            exit 1
          fi

      - name: Test build PKGBUILD
        run: |
          set -euo pipefail
          PKG="${{ matrix.package }}"
          PKG_DIR="/home/builduser/millenium-helpers/packaging/${PKG}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ "$PKG" == "millennium-helpers-bin" ]]; then
            URL="https://github.com/bolens/millenium-helpers/releases/download/v${VERSION}/millennium-helpers-v${VERSION}-linux-amd64.tar.gz"
            if ! curl -fsI "$URL" >/dev/null 2>&1; then
              echo "::notice::Release asset not published yet ($URL); skipping makepkg for -bin package"
              echo "namcap + .SRCINFO checks already passed."
              exit 0
            fi
          fi
          if [[ "$PKG" == "millennium-helpers" ]]; then
            URL="https://github.com/bolens/millenium-helpers/releases/download/v${VERSION}/millennium-helpers-v${VERSION}-src.tar.gz"
            if ! curl -fsI "$URL" >/dev/null 2>&1; then
              echo "::notice::Source release asset not published yet ($URL); skipping makepkg for from-source package"
              echo "namcap + .SRCINFO checks already passed."
              exit 0
            fi
          fi
          if [[ "$PKG" == "millennium-helpers-git" ]]; then
            # Makepkg clones github.com main by default; for PRs use this checkout
            # so we validate the branch under test (pkgbuild + make build).
            WORK="/home/builduser/millenium-helpers"
            PKGBUILD_PATH="${PKG_DIR}/PKGBUILD"
            # Use a plain file:// directory source (copy), not git+file:// clone —
            # cloning hits "dubious ownership" even with safe.directory under makepkg.
            sed -i "s|git+\${url}.git|file://${WORK}|" "$PKGBUILD_PATH"
            # System gitconfig: makepkg may not load builduser's ~/.gitconfig.
            git config --system --add safe.directory '*'
            git config --system --add safe.directory "${WORK}"
          fi
          su builduser -c "cd '${PKG_DIR}' && makepkg -s --noconfirm"
