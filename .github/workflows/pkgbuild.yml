name: "CI: PKGBUILD Package Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'packaging/millennium-helpers/**'
      - 'packaging/millennium-helpers-git/**'
      - 'scripts/ci/update-pkgbuild-pkgver.sh'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/millennium-mcp.py'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'completions/**'
      - 'man/**'
      - '.github/workflows/pkgbuild.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packaging/millennium-helpers/**'
      - 'packaging/millennium-helpers-git/**'
      - 'scripts/ci/update-pkgbuild-pkgver.sh'
      - 'VERSION'
      - 'scripts/millennium*.sh'
      - 'scripts/millennium-mcp.py'
      - 'scripts/common.sh'
      - 'scripts/lib/**'
      - 'completions/**'
      - 'man/**'
      - '.github/workflows/pkgbuild.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate AUR packaging (${{ matrix.package }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - millennium-helpers
          - millennium-helpers-git
    steps:
      - name: Install build tooling
        run: |
          pacman -Syu --noconfirm --quiet base-devel git namcap sudo

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint PKGBUILD with namcap
        run: |
          cd "packaging/${{ matrix.package }}"
          namcap PKGBUILD

      # makepkg refuses to run as root, so build as an unprivileged user
      # (mirroring how AUR helpers/makepkg are actually invoked).
      - name: Create build user
        run: |
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Copy checkout (including parent git dir so git describe works in pkgver)
          cp -r "$GITHUB_WORKSPACE" /home/builduser/millenium-helpers
          chown -R builduser:builduser /home/builduser/millenium-helpers
          su builduser -c 'git config --global --add safe.directory /home/builduser/millenium-helpers'

      - name: Verify .SRCINFO is up to date with PKGBUILD
        run: |
          PKG_DIR="packaging/${{ matrix.package }}"
          su builduser -c "cd /home/builduser/millenium-helpers/${PKG_DIR} && makepkg --printsrcinfo" > /tmp/generated.SRCINFO
          if ! diff -u -I '^\s*pkgver =' "${PKG_DIR}/.SRCINFO" /tmp/generated.SRCINFO; then
            echo "::error::${PKG_DIR}/.SRCINFO is out of date. Run 'makepkg --printsrcinfo > .SRCINFO' in ${PKG_DIR} and commit the result."
            exit 1
          fi

      - name: Test build PKGBUILD
        run: |
          su builduser -c "cd /home/builduser/millenium-helpers/packaging/${{ matrix.package }} && makepkg -s --noconfirm"
