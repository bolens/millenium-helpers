name: "CI: PKGBUILD Package Validation"

on:
  push:
    branches: [ main ]
    paths:
      - 'packaging/**'
      - 'scripts/**'
      - 'completions/**'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths:
      - 'packaging/**'
      - 'scripts/**'
      - 'completions/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate AUR packaging
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build tooling
        run: |
          pacman -Syu --noconfirm --quiet base-devel git namcap sudo

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint PKGBUILD with namcap
        run: |
          cd packaging
          namcap PKGBUILD

      # makepkg refuses to run as root, so build as an unprivileged user
      # (mirroring how AUR helpers/makepkg are actually invoked).
      - name: Create build user
        run: |
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Copy checkout (including parent git dir so git describe works in pkgver)
          cp -r "$GITHUB_WORKSPACE" /home/builduser/millenium-helpers
          chown -R builduser:builduser /home/builduser/millenium-helpers
          su builduser -c 'git config --global --add safe.directory /home/builduser/millenium-helpers'

      - name: Verify .SRCINFO is up to date with PKGBUILD
        run: |
          su builduser -c 'cd /home/builduser/millenium-helpers/packaging && makepkg --printsrcinfo' > /tmp/generated.SRCINFO
          if ! diff -u -I '^\s*pkgver =' packaging/.SRCINFO /tmp/generated.SRCINFO; then
            echo "::error::.SRCINFO is out of date. Run 'makepkg --printsrcinfo > .SRCINFO' in packaging/ and commit the result."
            exit 1
          fi

      - name: Test build PKGBUILD
        run: |
          su builduser -c 'cd /home/builduser/millenium-helpers/packaging && makepkg -s --noconfirm'
