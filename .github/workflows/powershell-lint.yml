name: "CI: PowerShell Script Analysis"

on:
  push:
    branches: [ main ]
    # Tag pushes always run (GitHub skips path filters for tags) so the
    # release workflow gate can wait on powershell-lint for the tag SHA.
    tags: [ 'v*' ]
    paths:
      - 'scripts/windows/**'
      - 'completions/powershell/**'
      - '.github/workflows/powershell-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/windows/**'
      - 'completions/powershell/**'
      - '.github/workflows/powershell-lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Invoke-ScriptAnalyzer directly — avoids microsoft/psscriptanalyzer-action's
      # hard dependency on ConvertToSARIF (PSGallery install flakes).
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Import-Module PSScriptAnalyzer

          $exclude = @(
            'PSAvoidUsingWriteHost',
            'PSUseApprovedVerbs',
            'PSAvoidUsingCmdletAliases',
            'PSUseShouldProcessForStateChangingFunctions'
          )
          $paths = @('scripts/windows', 'completions/powershell')
          $failed = $false
          foreach ($path in $paths) {
            if (!(Test-Path -Path $path)) { continue }
            Write-Host "=== Analyze $path ==="
            $results = @(Invoke-ScriptAnalyzer -Path $path -Recurse -Severity Error -ExcludeRule $exclude)
            if ($results.Count -gt 0) {
              $failed = $true
              $results | Format-Table -AutoSize Severity, RuleName, ScriptName, Line, Message
            } else {
              Write-Host "No Error-severity findings in $path"
            }
          }
          if ($failed) { exit 1 }
