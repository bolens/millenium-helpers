name: "CI: Go Strangler CLI"

on:
  push:
    branches: [ main ]
    # Tag pushes always run (GitHub skips path filters for tags) so the
    # release workflow gate can wait on Go CI for the tag SHA.
    tags: [ 'v*' ]
    paths:
      - 'go/**'
      - 'VERSION'
      - 'spec/cli-contract.yaml'
      - 'scripts/ci/check-cli-contract.py'
      - '.github/workflows/go.yml'
      - 'Makefile'
  pull_request:
    branches: [ main ]
    paths:
      - 'go/**'
      - 'VERSION'
      - 'spec/cli-contract.yaml'
      - 'scripts/ci/check-cli-contract.py'
      - '.github/workflows/go.yml'
      - 'Makefile'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: go/go.sum

      - name: Test
        shell: bash
        env:
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          cd go
          go test ./...

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          ver="$(tr -d '\n' < VERSION)"
          mkdir -p bin
          cd go
          go build -ldflags "-X github.com/bolens/millenium-helpers/internal/version.Version=${ver}" \
            -o ../bin/millennium ./cmd/millennium
          ../bin/millennium version

      - name: Smoke dispatcher meta (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          bin/millennium version | grep -F 'millennium version'
          bin/millennium -V | grep -F 'millennium version'
          bin/millennium --help | grep -E 'Available Commands|schedule|mcp'
          bin/millennium help | grep -E 'Available Commands|schedule|mcp'
          set +e
          suggest_out="$(bin/millennium upgrad 2>&1)"
          suggest_rc=$?
          set -e
          test "$suggest_rc" -ne 0
          echo "$suggest_out" | grep -F "Did you mean 'upgrade'"

      - name: Smoke schedule config (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          cfg_dir="$(mktemp -d)"
          export MILLENNIUM_CONFIG_DIR="$cfg_dir"
          export MILLENNIUM_CONFIG_FILE="$cfg_dir/config.json"
          bin/millennium schedule config set update_channel beta
          test "$(bin/millennium schedule config get update_channel | tr -d '[:space:]')" = "beta"
          bin/millennium schedule config list | grep -F 'update_channel'
          bin/millennium schedule config list | grep -F 'beta'
          rm -rf "$cfg_dir"

      - name: Smoke theme list (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          skins="$(mktemp -d)"
          export MILLENNIUM_SKINS_DIR="$skins"
          test "$(bin/millennium theme list --json | tr -d '[:space:]')" = "[]"
          mkdir -p "$skins/LocalSkin" "$skins/DemoTheme"
          printf '%s\n' '{"owner":"acme","repo":"DemoTheme","commit":"abcdef123456"}' \
            > "$skins/DemoTheme/metadata.json"
          bin/millennium theme list | grep -F 'LocalSkin'
          bin/millennium theme list | grep -F 'DemoTheme'
          bin/millennium theme list | grep -F 'acme/DemoTheme'
          json="$(bin/millennium theme list --json)"
          echo "$json" | grep -F '"name":"LocalSkin"'
          echo "$json" | grep -F '"type":"local"'
          echo "$json" | grep -F '"name":"DemoTheme"'
          echo "$json" | grep -F '"owner":"acme"'
          echo "$json" | grep -F '"type":"github"'
          rm -rf "$skins"

      - name: Smoke theme mutate (dual-OS, offline)
        shell: bash
        run: |
          set -euo pipefail
          skins="$(mktemp -d)"
          export MILLENNIUM_SKINS_DIR="$skins"
          set +e
          install_out="$(bin/millennium theme install not-a-valid 2>&1)"
          install_rc=$?
          set -e
          test "$install_rc" -ne 0
          echo "$install_out" | grep -F 'owner/repo'
          set +e
          remove_out="$(bin/millennium theme remove MissingTheme --yes 2>&1)"
          remove_rc=$?
          set -e
          test "$remove_rc" -ne 0
          echo "$remove_out" | grep -F 'not installed'
          mkdir -p "$skins/LocalSkin"
          bin/millennium theme update LocalSkin | grep -F 'does not have GitHub metadata'
          rm -rf "$skins"

      - name: Smoke schedule status (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          home="$(mktemp -d)"
          export HOME="$home"
          export XDG_CONFIG_HOME="$home/.config"
          export LOCALAPPDATA="$home/LocalAppData"
          export APPDATA="$home/AppData"
          export MILLENNIUM_CONFIG_DIR="$home/cfg"
          export MILLENNIUM_CONFIG_FILE="$home/cfg/config.json"
          mkdir -p "$MILLENNIUM_CONFIG_DIR" "$XDG_CONFIG_HOME" "$LOCALAPPDATA" "$APPDATA"
          out="$(bin/millennium schedule status)"
          echo "$out" | grep -F 'Scheduler disabled'
          echo "$out" | grep -F 'millennium schedule enable'
          rm -rf "$home"

      - name: Smoke schedule enable/disable dry-run (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          home="$(mktemp -d)"
          export HOME="$home"
          export XDG_CONFIG_HOME="$home/.config"
          export LOCALAPPDATA="$home/LocalAppData"
          export APPDATA="$home/AppData"
          export MILLENNIUM_CONFIG_DIR="$home/cfg"
          export MILLENNIUM_CONFIG_FILE="$home/cfg/config.json"
          mkdir -p "$MILLENNIUM_CONFIG_DIR" "$XDG_CONFIG_HOME" "$LOCALAPPDATA" "$APPDATA"
          en="$(bin/millennium schedule enable stable --dry-run)"
          echo "$en" | grep -F 'DRY RUN'
          echo "$en" | grep -F '[DRY RUN] Would'
          dis="$(bin/millennium schedule disable --dry-run)"
          echo "$dis" | grep -F 'DRY RUN'
          echo "$dis" | grep -F '[DRY RUN] Would'
          # Dry-run must not write systemd user units under the fake home.
          test ! -e "$XDG_CONFIG_HOME/systemd/user/millennium-update.timer"
          rm -rf "$home"

      - name: Smoke schedule setup wizard (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          home="$(mktemp -d)"
          export HOME="$home"
          export USERPROFILE="$home"
          export XDG_CONFIG_HOME="$home/.config"
          export LOCALAPPDATA="$home/LocalAppData"
          export APPDATA="$home/AppData"
          export MILLENNIUM_CONFIG_DIR="$home/cfg"
          export MILLENNIUM_CONFIG_FILE="$home/cfg/config.json"
          export FORCE_WIZARD=true
          mkdir -p "$MILLENNIUM_CONFIG_DIR" "$XDG_CONFIG_HOME" "$LOCALAPPDATA" "$APPDATA"
          # Channel 1 (stable), decline enable, skip PAT.
          out="$(printf '1\nn\n\n' | bin/millennium schedule setup --dry-run)"
          echo "$out" | grep -F 'Configuration Wizard'
          echo "$out" | grep -F '[DRY RUN] Would write config'
          echo "$out" | grep -F 'update_channel: stable'
          test ! -e "$MILLENNIUM_CONFIG_FILE"
          rm -rf "$home"

      - name: Smoke schedule pre/post-update hooks (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          home="$(mktemp -d)"
          export HOME="$home"
          export MILLENNIUM_STATE_DIR="$home/state"
          mkdir -p "$home/state" "$home/empty-proc" "$home/bin"
          # Without scheduler gate → refuse.
          set +e
          gate_out="$(bin/millennium schedule pre-update 2>&1)"
          gate_rc=$?
          set -e
          test "$gate_rc" -ne 0
          echo "$gate_out" | grep -F 'only for the scheduler'
          # With gate + no Steam → success.
          printf '%s\n' '#!/bin/sh' 'exit 1' >"$home/bin/pgrep"
          chmod +x "$home/bin/pgrep"
          export PATH="$home/bin:$PATH"
          export MOCK_PROC="$home/empty-proc"
          export MILLENNIUM_SCHEDULER=1
          bin/millennium schedule pre-update
          # post-update with diag stubbed via missing state is ok (no relaunch).
          # Prefer a fake diag on PATH that succeeds.
          printf '%s\n' '#!/bin/sh' 'exit 0' >"$home/bin/millennium-diag"
          chmod +x "$home/bin/millennium-diag"
          bin/millennium schedule post-update
          rm -rf "$home"

      - name: Smoke purge dry-run (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          home="$(mktemp -d)"
          export HOME="$home"
          export USERPROFILE="$home"
          export LOCALAPPDATA="$home/LocalAppData"
          export APPDATA="$home/AppData"
          mkdir -p "$LOCALAPPDATA" "$APPDATA"
          out="$(bin/millennium purge --dry-run)"
          echo "$out" | grep -F 'DRY RUN'
          rm -rf "$home"

      - name: Smoke upgrade rollback list (dual-OS)
        shell: bash
        run: |
          set -euo pipefail
          home="$(mktemp -d)"
          lib="$home/lib"
          mkdir -p "$lib/millennium.bak_smoke"
          export HOME="$home"
          export USERPROFILE="$home"
          export LOCALAPPDATA="$home/LocalAppData"
          export MOCK_LIB_DIR="$lib"
          out="$(bin/millennium upgrade --rollback list)"
          echo "$out" | grep -F 'Available Backups'
          echo "$out" | grep -F 'smoke'
          rm -rf "$home"

      - name: Smoke legacy help delegate (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          MILLENNIUM_SCRIPTS_DIR="$PWD/scripts" bin/millennium upgrade --help | grep -F 'Usage:'
          MILLENNIUM_SCRIPTS_DIR="$PWD/scripts" bin/millennium diag --help | grep -F 'Usage:'

  contract:
    name: CLI contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PyYAML
        run: pip install pyyaml

      - name: check-cli-contract
        run: make check-cli-contract
