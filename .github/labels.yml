# Repo label catalog (colors + descriptions).
# Synced by .github/workflows/labels.yml via crazy-max/ghaction-github-labeler.
# PR path matching lives in .github/labeler.yml.

# --- Area (auto-applied by path) ---
- name: "area: windows"
  color: "0078D4"
  description: "Windows PowerShell scripts or tests"
- name: "area: scripts"
  color: "2EA44F"
  description: "Unix shell scripts and shared libraries"
- name: "area: packaging"
  color: "D93F0B"
  description: "Scoop, Winget, or other package manifests"
- name: "area: homebrew"
  color: "FBB040"
  description: "Homebrew Formula"
- name: "area: archlinux"
  color: "1793D1"
  description: "Arch Linux PKGBUILD and related packaging"
- name: "area: nix"
  color: "5277C3"
  description: "Nix flake and package definitions"
- name: "area: mcp"
  color: "006B75"
  description: "Millennium MCP server"
- name: "area: docs"
  color: "0075CA"
  description: "README, docs, or man pages"
- name: "area: tests"
  color: "FBCA04"
  description: "Test suites and test helpers"
- name: "area: ci-cd"
  color: "BFD4F2"
  description: "GitHub Actions, CI helpers, or repo automation"

# --- Type (manual / issue templates / Dependabot) ---
- name: "bug"
  color: "D73A4A"
  description: "Something isn't working"
- name: "documentation"
  color: "0075CA"
  description: "Improvements or additions to documentation"
- name: "duplicate"
  color: "CFD3D7"
  description: "This issue or pull request already exists"
- name: "enhancement"
  color: "A2EEEF"
  description: "New feature or request"
- name: "good first issue"
  color: "7057FF"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "invalid"
  color: "E4E669"
  description: "This doesn't seem right"
- name: "question"
  color: "D876E3"
  description: "Further information is requested"
- name: "wontfix"
  color: "FFFFFF"
  description: "This will not be worked on"
- name: "dependencies"
  color: "0366D6"
  description: "Pull requests that update a dependency file"
- name: "github_actions"
  color: "000000"
  description: "Pull requests that update GitHub Actions code"
