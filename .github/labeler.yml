# GitHub PR Labeler Configuration
# Ref: https://github.com/actions/labeler
# Label colors/descriptions: .github/labels.yml

"area: windows":
  - changed-files:
      - any-glob-to-any-file:
          - "tests/windows/**"
          - "completions/powershell/**"
          - "packaging/scoop/**"
          - "packaging/chocolatey/**"
          - "packaging/winget/**"
          - "packaging/winget-git/**"
          - "go/internal/install/**"

"area: scripts":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/*.sh"
          - "scripts/ci/**"
          - "install.sh"

"area: packaging":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "packaging/scoop/**"
              - "packaging/winget/**"
              - "packaging/millennium-helpers/**"
              - "packaging/millennium-helpers-git/**"
      - head-branch:
          - "^chore/packaging-"

"area: homebrew":
  - changed-files:
      - any-glob-to-any-file: "Formula/**"

"area: archlinux":
  - changed-files:
      - any-glob-to-any-file:
          - "packaging/millennium-helpers/**"
          - "packaging/millennium-helpers-git/**"
          - "scripts/ci/sync-git-srcinfo.sh"

"area: nix":
  - changed-files:
      - any-glob-to-any-file:
          - "flake.nix"
          - "flake.lock"
          - "nix/**"
          - "default.nix"

"area: mcp":
  - changed-files:
      - any-glob-to-any-file:
          - "go/internal/mcp/**"
          - "docs/mcp.md"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CONTRIBUTING.md"
          - "docs/**"
          - "man/**"

"area: tests":
  - changed-files:
      - any-glob-to-any-file: "tests/**"

"area: ci-cd":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "scripts/ci/**"
