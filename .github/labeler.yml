# GitHub PR Labeler Configuration
# Ref: https://github.com/actions/labeler
# Label colors/descriptions: .github/labels.yml

"area: windows":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/windows/**"
          - "tests/windows/**"

"area: scripts":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/*.sh"
          - "scripts/lib/**"
          - "scripts/common.sh"

"area: packaging":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "packaging/scoop/**"
              - "packaging/winget/**"
              - "packaging/millennium-helpers/**"
              - "packaging/millennium-helpers-git/**"
      - head-branch:
          - "^chore/packaging-"

"area: homebrew":
  - changed-files:
      - any-glob-to-any-file: "Formula/**"

"area: archlinux":
  - changed-files:
      - any-glob-to-any-file:
          - "packaging/millennium-helpers/**"
          - "packaging/millennium-helpers-git/**"
          - "scripts/ci/sync-git-srcinfo.sh"

"area: nix":
  - changed-files:
      - any-glob-to-any-file:
          - "flake.nix"
          - "flake.lock"
          - "nix/**"
          - "default.nix"

"area: mcp":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/millennium-mcp.py"
          - "scripts/windows/millennium-mcp.ps1"
          - "tests/behavioral/test_mcp.sh"
          - "tests/windows/millennium-mcp.Tests.ps1"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CONTRIBUTING.md"
          - "docs/**"
          - "man/**"

"area: tests":
  - changed-files:
      - any-glob-to-any-file: "tests/**"

"area: ci-cd":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "scripts/ci/**"
